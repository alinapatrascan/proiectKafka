services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka-single-node
    hostname: kafka-single-node
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
